[env]
TERM = "xterm-256color"

[font]
size = 9.25

[font.normal]
family = "IntoneMono Nerd Font"
style = "Medium"

[window]
dynamic_title = true
opacity = 1

[window.dimensions]
columns = 89
lines = 28

[window.padding]
x = 12
y = 9

[mouse]
hide_when_typing = true

[colors.primary]
background = "#181818"
foreground = "#D3C6AA"
bright_foreground = "#D3C6AA"

[colors.normal]
black = "#475258"
red = "#e67e80"
green = "#a7c080"
yellow = "#dbbc7f"
blue = "#7fbbb3"
magenta = "#d699b6"
cyan = "#83c092"
white = "#d3c6aa"

[colors.bright]
black = "#475258"
red = "#e67e80"
green = "#a7c080"
yellow = "#dbbc7f"
blue = "#7fbbb3"
magenta = "#d699b6"
cyan = "#83c092"
white = "#d3c6aa"

[general]
live_config_reload = true
