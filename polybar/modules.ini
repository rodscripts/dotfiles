[module/bi]
type = custom/text
label = "%{T6}%{T-}"
label-foreground = ${color.innerbox}
label-background = ${color.bg}

[module/bd]
type = custom/text
label = "%{T6}%{T-}"
label-foreground = ${color.innerbox}
label-background = ${color.bg}

[module/date]
type = internal/date

interval = 1.0

format-background = ${color.innerbox}
format-foreground = ${color.fg}
time = "%{T4}%{F#83c092}%{F-}%{T2}%{F#9DA9A0}%a, %d %b%{F-} %{F#83c092}%{T4}󰇙%{T-}%{F-} %H:%M"

format = <label>
format-padding = 1
format-prefix =
format-prefix-font = 1
format-prefix-background = ${color.innerbox}
format-prefix-foreground = ${color.fg}

label = "%time%%date%"

[module/pulseaudio]
type = internal/pulseaudio

interval = 5
use-ui-max = false

format-volume = <label-volume>
format-volume-prefix = " "
format-volume-prefix-font = 4
format-volume-prefix-padding = 1
format-volume-prefix-foreground = ${color.green}

label-volume = "%percentage%%"
label-volume-padding = 0

format-muted = <label-muted>
format-muted-prefix = "󰎊"
format-muted-prefix-font = 4
format-muted-prefix-padding = 1
format-muted-prefix-foreground = ${color.orangered}

label-muted = "Muted"
label-muted-padding = 0
label-muted-foreground = ${color.mustard}

format-muted-padding = 0
format-muted-background = ${color.innerbox}

format-volume-padding = 0
format-volume-background = ${color.innerbox}

[module/bspwm]
type = internal/bspwm

enable-click = true
enable-scroll = true
reverse-scroll = true
pin-workspaces = true
occupied-scroll = false

format = <label-state> <label-mode> 

label-focused = %icon%
label-focused-foreground = ${color.yellow}
label-focused-padding = 1 

label-occupied =   
label-occupied-foreground = ${color.green}
label-occupied-padding = 1 

label-empty =  
label-empty-foreground = ${color.mustard}
label-empty-padding = 1 

ws-icon-default =  

format-padding = 1
format-font = 4
format-background = ${color.innerbox}

[module/sep]
type = custom/text
label = " "
label-foreground = ${color.bg}

[module/cpu]
type = internal/cpu

interval = 0.5

format = <label>
format-prefix = "  "
format-prefix-font = 4
format-prefix-background = ${color.innerbox}
format-prefix-foreground = ${color.green}

label = "%percentage%%"
label-background = ${color.innerbox}

[module/memory]
type = internal/memory

interval = 3

format = <label>
format-prefix = "  "
format-prefix-font = 4
format-prefix-background = ${color.innerbox}
format-prefix-foreground = ${color.green}

label = %used%
label-background = ${color.innerbox}

[module/playing]
type = custom/script
tail = true
interval = 1
label-padding = 2
format-prefix = %{F#83c092} 
format = <label>
exec = ~/.config/polybar/scripts/playing.sh
click-left = playerctl play-pause

format-padding = 2
format-prefix-foreground = ${color.yellow}
label-foreground = ${color.fg}
format-prefix-font = 3
label-font = 2
